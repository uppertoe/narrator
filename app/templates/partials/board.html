<div id="board" class="board">
  <section class="chart-pane">
    <div class="chart-frame">
      <div class="chart-labels">{{ chart_labels|safe }}</div>
      <div id="chart-scroll" class="chart-scroll" data-live-x="{{ chart_live_x }}">{{ chart_plot|safe }}</div>
    </div>
  </section>
  <script>
    (function () {  // keep the latest event near the right edge after each update
      var s = document.getElementById('chart-scroll');
      if (!s) return;
      var lx = parseFloat(s.dataset.liveX || '0');
      s.scrollLeft = Math.max(0, lx - s.clientWidth + 80);
    })();
  </script>

  <aside class="list-pane">
    {% if notice %}<p class="flash">↻ {{ notice }}</p>{% endif %}

    <section class="timeline-list">
      <div class="list-head">
        <h3>Timeline</h3>
        <button class="sm" hx-get="/case/{{ case.id }}/add"
                hx-target="#editor" hx-swap="innerHTML">+ add</button>
      </div>
      <div id="editor"></div>
      <div id="timeline-rows">
        {% if timeline %}
          {% for e in timeline %}{% include "partials/_event_row.html" %}{% endfor %}
        {% else %}
          <p class="muted empty"><em>No events yet — tap ● Listen or + add.</em></p>
        {% endif %}
      </div>
    </section>
  </aside>
</div>
